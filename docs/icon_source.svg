<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base tile gradients -->
    <linearGradient id="tileFill" x1="160" y1="120" x2="900" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFD"/>
      <stop offset="0.55" stop-color="#EEF2F7"/>
      <stop offset="1" stop-color="#E7EDF5"/>
    </linearGradient>
    <linearGradient id="tileEdge" x1="180" y1="140" x2="860" y2="880" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="0.45" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="1" stop-color="rgba(210,220,235,0.55)"/>
    </linearGradient>
    <radialGradient id="tileBottomGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(750 860) rotate(180) scale(360 220)">
      <stop offset="0" stop-color="#CFE3FF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#DCEBFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="tileShadow" x="80" y="90" width="864" height="864" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#AAB7C8" flood-opacity="0.22"/>
    </filter>
    <filter id="tileInnerSoft" x="110" y="110" width="804" height="804" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="120" y="120" width="784" height="784" rx="170"/>
    </clipPath>

    <!-- Input doc gradients -->
    <linearGradient id="docFill" x1="330" y1="230" x2="710" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE8B8" stop-opacity="0.95"/>
      <stop offset="0.48" stop-color="#F7B955" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="docEdge" x1="340" y1="230" x2="690" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.42" stop-color="#FFE4AA" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D97706" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="docFoldFill" x1="610" y1="240" x2="735" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6DE" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#F6B34F" stop-opacity="0.52"/>
    </linearGradient>
    <radialGradient id="docInnerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(455 330) rotate(58) scale(300 250)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="docShadow" x="270" y="200" width="500" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#C47A12" flood-opacity="0.24"/>
    </filter>
    <filter id="docSoftBlur" x="300" y="220" width="440" height="570" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="docClip">
      <path d="M328 258C328 238.118 344.118 222 364 222H610L724 336V734C724 753.882 707.882 770 688 770H364C344.118 770 328 753.882 328 734V258Z"/>
    </clipPath>

    <!-- Output doc gradients -->
    <linearGradient id="outputFill" x1="295" y1="170" x2="760" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="0.48" stop-color="#F4F7FA" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#E8EEF6" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="outputEdge" x1="300" y1="180" x2="760" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C9D4E3" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="outputFoldFill" x1="622" y1="178" x2="800" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#F3F6FA" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#DCE5F0" stop-opacity="0.68"/>
    </linearGradient>
    <radialGradient id="outputCoolGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(640 790) rotate(180) scale(310 210)">
      <stop offset="0" stop-color="#DDEBFF" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outputTopHighlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(410 260) rotate(55) scale(310 250)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="outputShadow" x="250" y="140" width="560" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#8FA0B5" flood-opacity="0.24"/>
    </filter>
    <filter id="outputInnerBlur" x="285" y="165" width="500" height="690" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="outputClip">
      <path d="M292 218C292 196.461 309.461 179 331 179H622L758 315V806C758 827.539 740.539 845 719 845H331C309.461 845 292 827.539 292 806V218Z"/>
    </clipPath>

    <!-- Hash gradients -->
    <linearGradient id="hashFill" x1="310" y1="230" x2="720" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4A4F55"/>
      <stop offset="0.48" stop-color="#2F3437"/>
      <stop offset="1" stop-color="#1F2326"/>
    </linearGradient>
    <linearGradient id="hashHighlight" x1="320" y1="235" x2="690" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="hashShadow" x="120" y="120" width="760" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1F2933" flood-opacity="0.22"/>
    </filter>

    <!-- Arrow gradients -->
    <linearGradient id="arrowFill" x1="270" y1="395" x2="755" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC" stop-opacity="0.96"/>
      <stop offset="0.45" stop-color="#C9D1DA" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#8F99A6" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="arrowEdge" x1="275" y1="400" x2="750" y2="635" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6F7A86" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="arrowHighlight" x1="300" y1="420" x2="700" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="arrowCoolGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(690 512) scale(230 130)">
      <stop offset="0" stop-color="#DCEBFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#DCEBFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="arrowShadow" x="210" y="330" width="610" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#6F7A86" flood-opacity="0.22"/>
    </filter>
    <filter id="arrowHighlightBlur" x="250" y="370" width="520" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="arrowClip">
      <path d="M292 482C292 464.327 306.327 450 324 450H608V398C608 384.474 623.682 376.973 634.214 385.458L772.214 496.458C780.064 502.773 780.064 514.727 772.214 521.042L634.214 632.042C623.682 640.527 608 633.026 608 619.5V568H324C306.327 568 292 553.673 292 536V482Z"/>
    </clipPath>

    <!-- Glow gradients -->
    <radialGradient id="mainGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(650 530) rotate(180) scale(390 260)">
      <stop offset="0" stop-color="#AFCBFF" stop-opacity="0.38"/>
      <stop offset="0.42" stop-color="#C7D9FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#DDEBFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(355 480) scale(240 220)">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.26"/>
      <stop offset="0.5" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="specularGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(420 275) rotate(40) scale(260 120)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="80" y="120" width="860" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="fineBlur" x="180" y="160" width="600" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
