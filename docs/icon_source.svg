  <!-- LAYER 1: Base tile -->
  <g id="base_tile">
    <g filter="url(#tileShadow)">
      <rect x="120" y="120" width="784" height="784" rx="170" fill="url(#tileFill)"/>
    </g>
    <g clip-path="url(#tileClip)">
      <rect x="120" y="120" width="784" height="784" rx="170" fill="url(#tileFill)"/>
      <ellipse cx="750" cy="860" rx="360" ry="220" fill="url(#tileBottomGlow)"/>
      <g filter="url(#tileInnerSoft)" opacity="0.55">
        <rect x="134" y="134" width="756" height="756" rx="156" stroke="white" stroke-width="10"/>
      </g>
    </g>
    <rect x="122" y="122" width="780" height="780" rx="168" stroke="url(#tileEdge)" stroke-width="4"/>
  </g>

  <!-- LAYER 2: Glow layer (atmospheric, behind documents) -->
  <g id="glow_layer" opacity="0.42">
    <g filter="url(#blurGlow)">
      <ellipse cx="650" cy="530" rx="390" ry="260" fill="url(#mainGlow)"/>
      <ellipse cx="355" cy="480" rx="240" ry="220" fill="url(#amberGlow)"/>
    </g>
    <g filter="url(#fineBlur)" opacity="0.78">
      <ellipse cx="420" cy="275" rx="260" ry="120" fill="url(#specularGlow)"/>
    </g>
  </g>

  <!-- LAYER 3: Input document (amber, left, smaller) -->
  <g id="input_document" transform="translate(-5.28 275.20) scale(0.555)">
    <g filter="url(#docShadow)">
      <path d="M328 258C328 238.118 344.118 222 364 222H610L724 336V734C724 753.882 707.882 770 688 770H364C344.118 770 328 753.882 328 734V258Z" fill="url(#docFill)"/>
    </g>
    <g clip-path="url(#docClip)">
      <path d="M328 258C328 238.118 344.118 222 364 222H610L724 336V734C724 753.882 707.882 770 688 770H364C344.118 770 328 753.882 328 734V258Z" fill="url(#docFill)"/>
      <ellipse cx="455" cy="330" rx="300" ry="250" fill="url(#docInnerGlow)"/>
      <g opacity="0.35" filter="url(#docSoftBlur)">
        <path d="M350 270C350 255.641 361.641 244 376 244H590L702 356V710C702 724.359 690.359 736 676 736H376C361.641 736 350 724.359 350 710V270Z" stroke="#FFFFFF" stroke-width="8"/>
      </g>
    </g>
    <path d="M610 222V306C610 322.569 623.431 336 640 336H724L610 222Z" fill="url(#docFoldFill)"/>
    <path d="M610 222V306C610 322.569 623.431 336 640 336H724" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="4"/>
    <path d="M328 258C328 238.118 344.118 222 364 222H610L724 336V734C724 753.882 707.882 770 688 770H364C344.118 770 328 753.882 328 734V258Z" stroke="url(#docEdge)" stroke-width="5"/>
    <path d="M362 258C362 250.268 368.268 244 376 244H592" stroke="#FFFFFF" stroke-opacity="0.72" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- LAYER 4: Arrow (between documents) -->
  <g id="arrow" transform="translate(333.02 371.63) scale(0.263)" opacity="0.92">
    <g filter="url(#arrowShadow)">
      <path d="M292 482C292 464.327 306.327 450 324 450H608V398C608 384.474 623.682 376.973 634.214 385.458L772.214 496.458C780.064 502.773 780.064 514.727 772.214 521.042L634.214 632.042C623.682 640.527 608 633.026 608 619.5V568H324C306.327 568 292 553.673 292 536V482Z" fill="url(#arrowFill)"/>
    </g>
    <g clip-path="url(#arrowClip)">
      <path d="M292 482C292 464.327 306.327 450 324 450H608V398C608 384.474 623.682 376.973 634.214 385.458L772.214 496.458C780.064 502.773 780.064 514.727 772.214 521.042L634.214 632.042C623.682 640.527 608 633.026 608 619.5V568H324C306.327 568 292 553.673 292 536V482Z" fill="url(#arrowFill)"/>
      <ellipse cx="690" cy="512" rx="230" ry="130" fill="url(#arrowCoolGlow)"/>
      <g filter="url(#arrowHighlightBlur)" opacity="0.75">
        <path d="M330 472H602C620 472 634 486 634 504" stroke="url(#arrowHighlight)" stroke-width="18" stroke-linecap="round"/>
      </g>
    </g>
    <path d="M292 482C292 464.327 306.327 450 324 450H608V398C608 384.474 623.682 376.973 634.214 385.458L772.214 496.458C780.064 502.773 780.064 514.727 772.214 521.042L634.214 632.042C623.682 640.527 608 633.026 608 619.5V568H324C306.327 568 292 553.673 292 536V482Z" stroke="url(#arrowEdge)" stroke-width="5"/>
  </g>

  <!-- LAYER 5: Output document (white/glass, right, dominant) -->
  <g id="output_document" transform="translate(359.08 182.27) scale(0.644)">
    <g filter="url(#outputShadow)">
      <path d="M292 218C292 196.461 309.461 179 331 179H622L758 315V806C758 827.539 740.539 845 719 845H331C309.461 845 292 827.539 292 806V218Z" fill="url(#outputFill)"/>
    </g>
    <g clip-path="url(#outputClip)">
      <path d="M292 218C292 196.461 309.461 179 331 179H622L758 315V806C758 827.539 740.539 845 719 845H331C309.461 845 292 827.539 292 806V218Z" fill="url(#outputFill)"/>
      <ellipse cx="640" cy="790" rx="310" ry="210" fill="url(#outputCoolGlow)"/>
      <ellipse cx="410" cy="260" rx="310" ry="250" fill="url(#outputTopHighlight)"/>
      <g opacity="0.48" filter="url(#outputInnerBlur)">
        <path d="M318 232C318 217.088 330.088 205 345 205H602L732 335V788C732 802.912 719.912 815 705 815H345C330.088 815 318 802.912 318 788V232Z" stroke="#FFFFFF" stroke-width="10"/>
      </g>
    </g>
    <path d="M622 179V280C622 299.33 637.67 315 657 315H758L622 179Z" fill="url(#outputFoldFill)"/>
    <path d="M622 179V280C622 299.33 637.67 315 657 315H758" stroke="#FFFFFF" stroke-opacity="0.62" stroke-width="5"/>
    <path d="M292 218C292 196.461 309.461 179 331 179H622L758 315V806C758 827.539 740.539 845 719 845H331C309.461 845 292 827.539 292 806V218Z" stroke="url(#outputEdge)" stroke-width="5"/>
    <path d="M326 218C326 210.268 332.268 204 340 204H596" stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- LAYER 6: Hash symbol (on output document) -->
  <g id="hash_symbol" transform="translate(572.25 383.10) scale(0.261)">
    <g filter="url(#hashShadow)">
      <path d="M420 212C438 212 452 226 449 244L425 392H575L599 244C602 226 618 212 636 212H654C672 212 686 226 683 244L659 392H732C750 392 764 406 764 424V442C764 460 750 474 732 474H646L625 604H698C716 604 730 618 730 636V654C730 672 716 686 698 686H612L588 834C585 852 569 866 551 866H533C515 866 501 852 504 834L528 686H378L354 834C351 852 335 866 317 866H299C281 866 267 852 270 834L294 686H222C204 686 190 672 190 654V636C190 618 204 604 222 604H307L328 474H255C237 474 223 460 223 442V424C223 406 237 392 255 392H341L365 244C368 226 384 212 402 212H420ZM412 474L391 604H541L562 474H412Z" fill="url(#hashFill)" fill-rule="evenodd"/>
      <path d="M420 212C438 212 452 226 449 244L425 392H575L599 244C602 226 618 212 636 212H654C672 212 686 226 683 244L659 392H732C750 392 764 406 764 424V442C764 460 750 474 732 474H646L625 604H698C716 604 730 618 730 636V654C730 672 716 686 698 686H612L588 834C585 852 569 866 551 866H533C515 866 501 852 504 834L528 686H378L354 834C351 852 335 866 317 866H299C281 866 267 852 270 834L294 686H222C204 686 190 672 190 654V636C190 618 204 604 222 604H307L328 474H255C237 474 223 460 223 442V424C223 406 237 392 255 392H341L365 244C368 226 384 212 402 212H420ZM412 474L391 604H541L562 474H412Z" fill="url(#hashHighlight)" fill-rule="evenodd" opacity="0.7"/>
    </g>
  </g>

</svg>
