name: Nightly Upstream Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: read
  issues: write

jobs:
  upstream-check:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: Upmarket/Python/Python.xcframework
          key: ${{ runner.os }}-${{ runner.arch }}-python-runtime-${{ hashFiles('requirements.txt', 'scripts/build_python_env.sh', 'scripts/ci/verify_python_bundle.sh', 'UpmarketPython/**/*.py') }}

      - name: Generate upstream watch report
        run: scripts/ci/watch_upstream.py

      - name: Upload upstream watch report
        uses: actions/upload-artifact@v4
        with:
          name: upstream-watch-report
          path: |
            reports/upstream-watch.json
            reports/upstream-watch.md

      - name: Create or update upstream watch issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/upstream-watch.json', 'utf8'));
            if (!report.has_findings) {
              core.info('No upstream candidates or blocked checks detected.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '[Upstream] Scheduled dependency watch';
            const labels = [
              { name: 'upstream-watch', color: '6f42c1', description: 'Tracked upstream item; no adoption yet' },
              { name: 'upstream-candidate', color: 'fbca04', description: 'Upstream change is ready for local validation' },
              { name: 'upstream-adopted', color: '0e8a16', description: 'Validated upstream change has been adopted' },
              { name: 'upstream-rejected', color: 'b60205', description: 'Upstream change was rejected for this app' },
              { name: 'upstream-blocked', color: 'd93f0b', description: 'Waiting on upstream, security, license, or release review' },
              { name: 'upstream-fork', color: '5319e7', description: 'Temporary fork or cherry-pick under validation' }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }
            const candidates = report.packages.filter((pkg) => pkg.status === 'candidate' || pkg.status === 'latest-upstream');
            const blocked = report.packages.filter((pkg) => pkg.status === 'blocked');
            const rows = candidates.map((pkg) => {
              const current = pkg.current_version || pkg.specifier || 'unbounded';
              const candidate = pkg.candidate_version || current;
              return `| \`${pkg.name}\` | ${pkg.upstream_project} | \`${pkg.tracking_mode}\` | \`${current}\` | \`${candidate}\` | \`${pkg.latest_version}\` | \`${pkg.status}\` |`;
            }).join('\n');
            const blockedRows = blocked.map((pkg) => {
              const current = pkg.current_version || pkg.specifier || 'unbounded';
              return `| \`${pkg.name}\` | ${pkg.upstream_project} | \`${pkg.tracking_mode}\` | \`${current}\` | ${pkg.error || 'unknown error'} |`;
            }).join('\n');
            const body = [
              'Scheduled upstream watch found dependency candidates or blocked checks.',
              '',
              `Generated: \`${report.generated_at}\``,
              '',
              '## Candidates',
              '',
              '| Package | Project | Tracking | Current | Candidate | Latest | Status |',
              '| --- | --- | --- | --- | --- | --- | --- |',
              rows || '| _None_ | | | | | | |',
              '',
              '## Blocked Checks',
              '',
              '| Package | Project | Tracking | Declared | Error |',
              '| --- | --- | --- | --- | --- |',
              blockedRows || '| _None_ | | | | |',
              '',
              'Required adoption gate before promotion:',
              '',
              '- create or update a dedicated upstream intake issue for each adopted candidate;',
              '- add a reproduction or corpus case;',
              '- run dependency audit, packaged import, and offline smoke;',
              '- document rollback and security/privacy impact;',
              '- promote only after human review.'
            ].join('\n');

            const query = `repo:${owner}/${repo} is:issue is:open in:title "${title}"`;
            const existing = await github.rest.search.issuesAndPullRequests({ q: query, per_page: 1 });
            if (existing.data.items.length > 0) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.data.items[0].number,
                title,
                body,
                labels: ['upstream-watch']
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['upstream-watch']
            });

      - name: Create dependency check virtualenv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Check currently tracked upstream dependency updates
        run: scripts/update_dependencies.sh --check-only

      - name: Validate current corpus manifest
        run: |
          scripts/ci/validate_corpus.py
          scripts/ci/validate_corpus_baseline.py

      - name: Validate Python bundle imports
        run: scripts/ci/ensure_python_runtime.sh
