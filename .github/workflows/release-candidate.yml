name: Release Candidate

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"

jobs:
  release-candidate:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
      DERIVED_DATA_DIR: build/DerivedData
      UPMARKET_RESULT_BUNDLE_DIR: build/TestResults
      ARCHIVE_PATH: build/Upmarket.xcarchive
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Release gate
        run: scripts/ci/gate.sh release

      - name: Archive
        run: |
          xcodebuild archive \
            -project Upmarket/Upmarket.xcodeproj \
            -scheme Upmarket \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_DIR" \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify archived app package gates
        run: |
          APP="$ARCHIVE_PATH/Products/Applications/Upmarket.app"
          scripts/ci/verify_release_app.sh "$APP"

      # Corpus pathway coverage + manifest/baseline integrity are validated by
      # `gate.sh release` (corpus_and_model_gate). The corpus quality-scoring benchmark
      # harness was Python/Docling-based and was removed with the runtime; a native
      # harness (drive upmarket-cli over the corpus, score against ground truth) is a
      # follow-up.

      - name: UI automation tests
        run: scripts/ci/gate.sh ui

      - name: Upload UI test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-ui-xcresult
          path: build/TestResults/*.xcresult
          if-no-files-found: ignore
