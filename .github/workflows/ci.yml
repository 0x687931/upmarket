name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-ci:
    runs-on: macos-14
    env:
      DERIVED_DATA_DIR: build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Python runtime
        uses: actions/cache@v4
        with:
          path: Upmarket/Python/Python.xcframework
          key: ${{ runner.os }}-python-runtime-${{ hashFiles('requirements.txt', 'scripts/build_python_env.sh', 'scripts/ci/verify_python_bundle.sh', 'UpmarketPython/**/*.py') }}

      - name: Prepare Python runtime
        run: scripts/ci/ensure_python_runtime.sh

      - name: Fast PR gate
        run: scripts/ci/gate.sh quick
