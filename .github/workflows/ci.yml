name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pr-ci:
    runs-on: macos-14
    env:
      DERIVED_DATA_DIR: build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Fast PR gate
        run: scripts/ci/gate.sh quick
