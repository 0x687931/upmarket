name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"
  pull_request:
    paths:
      - "requirements.txt"
      - "requirements-candidate.txt"
      - "scripts/ci/validate_dependency_lock.py"
      - "scripts/ci/validate_corpus_baseline.py"
      - "scripts/build_python_env.sh"
      - "scripts/update_dependencies.sh"
      - "UpmarketPython/**"

jobs:
  dependency-audit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python dependency pins
        run: scripts/ci/validate_dependency_lock.py

      - name: Check corpus quality baseline
        run: scripts/ci/validate_corpus_baseline.py

      - name: Create audit virtualenv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Check installed dependency consistency
        run: .venv/bin/pip check

      - name: Check for undeclared PATH tools
        run: |
          if rg -n "subprocess\\.run\\(\\s*\\[\\s*['\\\"](ffprobe|ffmpeg|exiftool)" UpmarketPython; then
            echo "error: runtime must not depend on undeclared PATH tools"
            exit 1
          fi
          echo "ok: no undeclared PATH tool usage detected"

      - name: Generate license inventory
        run: scripts/generate_licenses.sh
