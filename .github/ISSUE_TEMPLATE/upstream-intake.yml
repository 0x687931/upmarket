name: Upstream Intake
description: Track upstream issues, releases, or patches before adopting them
title: "[Upstream] "
labels: ["upstream-blocked", "upstream-watch"]
body:
  - type: dropdown
    id: upstream_project
    attributes:
      label: Upstream Project
      options:
        - BeeWare Python Apple support
        - Docling
        - MarkItDown
        - pypdfium2
        - Hugging Face Hub
        - Transformers
        - Torch / MLX
        - Xcode / macOS SDK
        - Upmarket fork/cherry-pick
        - Other
    validations:
      required: true
  - type: input
    id: upstream_url
    attributes:
      label: Upstream URL
      description: Issue, pull request, release note, commit, or advisory URL.
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What changed upstream and why it may matter to Upmarket.
    validations:
      required: true
  - type: textarea
    id: affected_area
    attributes:
      label: Affected Upmarket Area
      placeholder: "Conversion pipeline, Python packaging, model download, sandbox, App Store review, etc."
    validations:
      required: true
  - type: input
    id: dependency_state
    attributes:
      label: Dependency or Model State
      description: Current pin/revision and proposed candidate pin/revision.
      placeholder: "current: docling==2.96.0; candidate: docling==2.97.0"
    validations:
      required: true
  - type: textarea
    id: fork_state
    attributes:
      label: Fork or Cherry-Pick State
      description: Required if using a fork, local patch, or unreleased upstream commit.
      placeholder: "base: docling==2.96.0; fork: <url>; branch: upmarket/p0-fix; commit: <sha>; checksum/artifact: <value>; upstream PR: <url>"
  - type: textarea
    id: reproduction
    attributes:
      label: Local Reproduction or Corpus Case
      description: Link a corpus fixture, failing document class, or command that shows the issue.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User Impact
      description: What users gain or avoid if we adopt this.
    validations:
      required: true
  - type: checkboxes
    id: review
    attributes:
      label: Required Review
      options:
        - label: Conversion quality benchmark required
        - label: Corpus fixture or benchmark case linked before adoption
        - label: Packaged Python import/offline smoke required
        - label: Dependency lock validation required
        - label: License inventory review required
        - label: Security/privacy review required
        - label: App Store entitlement/plist review required
        - label: Model manifest/checksum validation required
        - label: ADR required for local patch
        - label: Fork/cherry-pick pinned to immutable commit or packaged artifact
        - label: Upstream PR submitted or reason documented
        - label: Removal condition and review/expiry date documented
  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      description: How to revert or disable this if adoption fails.
    validations:
      required: true
